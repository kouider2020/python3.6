name: Cross-compile Python 3.6 for Termux/ARM

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  cross-compile:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        arch: [arm, aarch64]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up ARM cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncursesw5-dev \
            libgdbm-dev \
            libc6-dev \
            zlib1g-dev \
            libsqlite3-dev \
            tk-dev \
            libssl-dev \
            openssl \
            libbz2-dev \
            libffi-dev \
            liblzma-dev
          
          if [ "${{ matrix.arch }}" = "arm" ]; then
            sudo apt-get install -y arm-linux-gnueabihf-gcc arm-linux-gnueabihf-g++
            export CC=arm-linux-gnueabihf-gcc
            export CXX=arm-linux-gnueabihf-g++
            export AR=arm-linux-gnueabihf-ar
            export RANLIB=arm-linux-gnueabihf-ranlib
            export PREFIX=/tmp/python-arm
          else
            sudo apt-get install -y aarch64-linux-gnu-gcc aarch64-linux-gnu-g++
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
            export AR=aarch64-linux-gnu-ar
            export RANLIB=aarch64-linux-gnu-ranlib
            export PREFIX=/tmp/python-aarch64
          fi
      
      - name: Download Python 3.6 source
        run: |
          wget https://www.python.org/ftp/python/3.6.15/Python-3.6.15.tar.xz
          tar -xf Python-3.6.15.tar.xz
      
      - name: Configure Python for cross-compilation
        run: |
          cd Python-3.6.15
          
          if [ "${{ matrix.arch }}" = "arm" ]; then
            export CC=arm-linux-gnueabihf-gcc
            export CXX=arm-linux-gnueabihf-g++
            export PREFIX=/tmp/python-arm
            ./configure --prefix=$PREFIX \
              --host=arm-linux-gnueabihf \
              --build=x86_64-linux-gnu \
              --disable-ipv6 \
              --with-openssl=/usr
          else
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
            export PREFIX=/tmp/python-aarch64
            ./configure --prefix=$PREFIX \
              --host=aarch64-linux-gnu \
              --build=x86_64-linux-gnu \
              --disable-ipv6 \
              --with-openssl=/usr
          fi
      
      - name: Build Python
        run: |
          cd Python-3.6.15
          make -j$(nproc)
      
      - name: Install Python
        run: |
          cd Python-3.6.15
          if [ "${{ matrix.arch }}" = "arm" ]; then
            make install DESTDIR=/tmp/python-arm-install
          else
            make install DESTDIR=/tmp/python-aarch64-install
          fi
      
      - name: Create tarball
        run: |
          if [ "${{ matrix.arch }}" = "arm" ]; then
            cd /tmp/python-arm-install
            tar -czf python3.6-arm.tar.gz .
            mv python3.6-arm.tar.gz $GITHUB_WORKSPACE/
          else
            cd /tmp/python-aarch64-install
            tar -czf python3.6-aarch64.tar.gz .
            mv python3.6-aarch64.tar.gz $GITHUB_WORKSPACE/
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: python-3.6-${{ matrix.arch }}
          path: python3.6-${{ matrix.arch }}.tar.gz
          retention-days: 30

  release:
    needs: cross-compile
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Download all artifacts
        uses: actions/download-artifact@v3
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            python-3.6-arm/python3.6-arm.tar.gz
            python-3.6-aarch64/python3.6-aarch64.tar.gz
